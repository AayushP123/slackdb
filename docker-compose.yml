version: '3.8'

services:
  slackdb-bot:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOST=0.0.0.0
    restart: unless-stopped
    
  # Optional: PostgreSQL for state management
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slackdb
      POSTGRES_USER: slackdb
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  # Optional: Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
